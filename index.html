<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eclipse Rest Station</title>
    <style>
        :root { --red: #ff3e3e; --bg: #000000; --green: #2ecc71; }
        body { margin: 0; background-color: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }
        .app-container { display: flex; width: 100%; height: 100vh; }

        .video-wrapper { background: #000; flex: 4; padding: 30px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; position: relative; }
        .video-container { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; border: 1px solid #222; background: #050505; }
        .timer-card { flex: 1.5; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #111; min-width: 350px; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .video-wrapper { height: 40vh; width: 100%; padding: 10px; }
            .timer-card { height: 60vh; width: 100%; border-left: none; justify-content: flex-start; padding-top: 15px; }
            input[type="text"] { font-size: 80px !important; width: 120px !important; }
        }

        iframe { width: 100%; height: 100%; border: none; }

        .set-widget {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); 
            padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #333; z-index: 100;
        }
        .set-count { font-size: 20px; font-weight: 900; min-width: 25px; text-align: center; color: var(--green); }
        .set-btn { background: #222; border: 1px solid #444; color: white; border-radius: 8px; padding: 8px 14px; font-weight: bold; cursor: pointer; }

        .input-group { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        input[type="text"] { background: none; border: none; color: white; font-size: 110px; font-weight: 900; width: 170px; text-align: center; outline: none; }
        .colon { font-size: 50px; font-weight: 900; color: #1a1a1a; transition: 0.3s; }
        .active .colon { color: var(--red); text-shadow: 0 0 15px var(--red); }
        
        .btn-box { display: flex; flex-direction: column; gap: 10px; width: 340px; }
        button.main-action { padding: 18px; border-radius: 15px; border: 1px solid #333; background: #0a0a0a; color: #fff; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        .start-btn { border-color: var(--green) !important; color: var(--green) !important; }
        .active .start-btn { border-color: var(--red) !important; color: var(--red) !important; }
        
        .nav-row { display: flex; gap: 10px; margin-top: 10px; }
        .nav-btn { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 62, 62, 0.98); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div class="app-container" id="main-ui">
        <div class="video-wrapper">
            <div class="video-container">
                <div class="set-widget">
                    <span id="setCount" class="set-count">0</span>
                    <button class="set-btn" onclick="updateSet(1)">+</button>
                </div>
                <iframe id="player" src="" allow="autoplay; fullscreen"></iframe>
            </div>
        </div>

        <div class="timer-card">
            <div class="input-group">
                <input type="text" id="m" value="02" maxlength="2">
                <span class="colon">:</span>
                <input type="text" id="s" value="00" maxlength="2">
            </div>
            
            <div class="btn-box">
                <button class="main-action start-btn" id="mainBtn" onclick="toggleTimer()">Start Rest</button>
                <button class="main-action" onclick="resetTimer()">Reset Timer</button>
                <div class="nav-row">
                    <button class="nav-btn" onclick="shuffleVideo()">Next Video</button>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAlert()"><h1>DONE</h1><p>TAP TO DISMISS</p></div>

    <script>
        let timer, running = false, secondsLeft = 120, sets = 0;
        let playedIndices = [];

        // Updated IDs (Verified for Embedding)
        const IDs = [
            'pY628jAtH-w', 'NAExCiZ6j38', 'WiEWpuOmYww', 'ZIfUsK_W24s', 
            'mP0V_u8u6uL', 'Xp5tgiHYT2Q', '4ZAlBrCnkgA', 'X6vM0r8XhMc',
            'wMEzzbb4UMQ', 'mYm_XIDp7vA', 'vIAnS3N0Uf4', 'e1wZ982AQjc'
        ];

        function updateSet(val) {
            sets = Math.max(0, sets + val);
            document.getElementById('setCount').textContent = sets;
        }

        function shuffleVideo() {
            if (playedIndices.length === IDs.length) playedIndices = [];
            let randomIndex;
            do { randomIndex = Math.floor(Math.random() * IDs.length); } 
            while (playedIndices.includes(randomIndex));
            playedIndices.push(randomIndex);
            
            document.getElementById('player').src = `https://www.youtube.com/embed/${IDs[randomIndex]}?autoplay=1&modestbranding=1&rel=0`;
        }

        shuffleVideo();

        function toggleTimer() {
            if (running) {
                clearInterval(timer);
                running = false;
                document.getElementById('mainBtn').textContent = "Resume Rest";
                document.getElementById('main-ui').classList.remove('active');
            } else {
                let m = parseInt(document.getElementById('m').value) || 0;
                let s = parseInt(document.getElementById('s').value) || 0;
                secondsLeft = (m * 60) + s;
                running = true;
                document.getElementById('mainBtn').textContent = "Pause Rest";
                document.getElementById('main-ui').classList.add('active');
                timer = setInterval(tick, 1000);
            }
        }

        function tick() {
            if (secondsLeft <= 0) {
                clearInterval(timer);
                running = false;
                document.getElementById('overlay').style.display = 'flex';
                return;
            }
            secondsLeft--;
            document.getElementById('m').value = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
            document.getElementById('s').value = (secondsLeft % 60).toString().padStart(2, '0');
        }

        function closeAlert() {
            document.getElementById('overlay').style.display = 'none';
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            running = false;
            document.getElementById('main-ui').classList.remove('active');
            document.getElementById('mainBtn').textContent = "Start Rest";
            document.getElementById('m').value = "02"; 
            document.getElementById('s').value = "00";
            secondsLeft = 120;
        }
    </script>
</body>
</html>
