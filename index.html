<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eclipse Pro Timer</title>
    <style>
        :root { --red: #ff3e3e; --bg: #000000; }
        body { margin: 0; background-color: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .app-container { display: flex; width: 100%; height: 100vh; }

        @media (orientation: landscape) {
            .app-container { flex-direction: row; }
            .video-wrapper { flex: 3; border-right: 2px solid #111; }
            .timer-card { flex: 1.2; min-width: 450px; }
        }

        .video-wrapper { background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Dimming REMOVED from .active .video-wrapper */

        .set-widget {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.85); padding: 12px;
            border-radius: 8px; display: flex; align-items: center; gap: 12px;
            border: 1px solid #333; z-index: 100;
        }
        .set-count { font-size: 24px; font-weight: 900; color: #ffffff; min-width: 30px; text-align: center; }
        .set-btn { background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 4px; cursor: pointer; padding: 5px 12px; font-weight: bold; }

        .timer-card { background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        input[type="text"] { 
            background: none; border: none; color: white; font-size: 110px; font-weight: 900; 
            width: 180px; text-align: center; outline: none; font-family: inherit;
        }
        .colon { font-size: 60px; font-weight: 900; color: #222; }
        .active .colon { color: var(--red); text-shadow: 0 0 15px var(--red); }

        .btn-box { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; width: 320px; }
        button.main-action { 
            padding: 16px; border-radius: 8px; border: 1px solid #333; 
            background: none; color: #888; font-weight: 800; cursor: pointer;
            font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
        }
        .active .start-btn { border-color: var(--red); color: var(--red); }
        
        .shuffle-box { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; }
        .shuffle-btn { 
            background: #111; border: 1px solid #222; color: #555; 
            padding: 12px; border-radius: 5px; cursor: pointer; 
            font-size: 9px; font-weight: bold; text-transform: uppercase;
        }
        .shuffle-btn:hover { color: #fff; border-color: #666; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 62, 62, 0.8); /* Semi-transparent red */
            color: white; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
        #overlay h1 { font-size: 150px; margin: 0; font-weight: 900; text-shadow: 0 0 30px black; }
        #overlay p { font-weight: bold; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="app-container" id="main-ui">
        <div class="video-wrapper">
            <div class="set-widget">
                <span id="setCount" class="set-count">0</span>
                <button class="set-btn" onclick="updateSet(1)">+</button>
                <button class="set-btn" style="color:#444" onclick="updateSet(-1)">-</button>
            </div>
            <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="timer-card">
            <div class="input-group">
                <input type="text" id="m" value="01" maxlength="2">
                <span class="colon">:</span>
                <input type="text" id="s" value="00" maxlength="2">
            </div>
            
            <div class="btn-box">
                <button class="main-action start-btn" id="mainBtn" onclick="toggleTimer()">Start Rest</button>
                <button class="main-action" onclick="resetTimer()">Reset Timer</button>
                
                <div class="shuffle-box">
                    <button class="shuffle-btn" onclick="shuffleVideo('PL3tRBEVW0hiBSFOFhTC5wt75P2BES0rAo')">Shuffle Markiplier</button>
                    <button class="shuffle-btn" onclick="shuffleVideo('PL6ubiYaxclxB_4Ei0bNcT1sYrruqNAFE8')">Shuffle CoryxKenshin</button>
                    <button class="shuffle-btn" onclick="shuffleVideo('PLE9uTCjAvNCw_cIelrB2-ab9GFUUkrBFZ')">Shuffle UFC Full Fights</button>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAlert()">
        <h1>DONE</h1>
        <p>CLICK ANYWHERE TO DISMISS</p>
    </div>

    <script>
        let timer, running = false, secondsLeft = 60, sets = 0;

        function updateSet(val) {
            sets = Math.max(0, sets + val);
            document.getElementById('setCount').textContent = sets;
        }

        function shuffleVideo(playlistID) {
            const randomIdx = Math.floor(Math.random() * 100) + 1;
            document.getElementById('player').src = `https://www.youtube.com/embed/videoseries?list=${playlistID}&index=${randomIdx}&autoplay=1`;
        }

        shuffleVideo('PL3tRBEVW0hiBSFOFhTC5wt75P2BES0rAo');

        function toggleTimer() {
            if (running) {
                clearInterval(timer);
                running = false;
                document.getElementById('mainBtn').textContent = "Resume Rest";
                document.getElementById('main-ui').classList.remove('active');
            } else {
                let m = parseInt(document.getElementById('m').value) || 0;
                let s = parseInt(document.getElementById('s').value) || 0;
                secondsLeft = (m * 60) + s;
                if (secondsLeft <= 0) return;
                running = true;
                document.getElementById('mainBtn').textContent = "Pause Rest";
                document.getElementById('main-ui').classList.add('active');
                timer = setInterval(tick, 1000);
            }
        }

        function tick() {
            if (secondsLeft <= 0) {
                clearInterval(timer);
                running = false;
                document.getElementById('overlay').style.display = 'flex';
                return;
            }
            secondsLeft--;
            document.getElementById('m').value = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
            document.getElementById('s').value = (secondsLeft % 60).toString().padStart(2, '0');
        }

        function closeAlert() {
            document.getElementById('overlay').style.display = 'none';
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            running = false;
            document.getElementById('main-ui').classList.remove('active');
            document.getElementById('mainBtn').textContent = "Start Rest";
            document.getElementById('m').value = "01"; 
            document.getElementById('s').value = "00";
        }
    </script>
</body>
</html>
