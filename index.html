<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eclipse Rest Station</title>
    <style>
        :root { 
            --red: #ff3e3e; 
            --bg: #050505; 
            --card-bg: #111111;
            --green: #2ecc71; 
            --border: #222;
        }
        
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Responsive Container */
        .app-container { 
            display: flex; 
            width: 95%; 
            height: 90vh; 
            max-width: 1400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Video Area */
        .video-wrapper { 
            flex: 3; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #000;
        }
        .video-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #player { width: 100%; height: 100%; border: none; }

        /* Controls Area */
        .timer-card { 
            flex: 1.2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-evenly; 
            padding: 40px 20px;
            border-left: 1px solid var(--border);
            background: linear-gradient(145deg, #0a0a0a, #111);
        }

        /* Sets Widget Refined */
        .set-widget {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.03);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .set-label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #444; font-weight: 800; }
        .set-count { font-size: 32px; font-weight: 900; min-width: 40px; text-align: center; color: var(--green); text-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        .set-btn { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; width: 45px; height: 45px; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .set-btn:hover { background: #222; border-color: #555; }
        .set-btn:active { transform: scale(0.9); background: var(--green); color: black; }

        /* Timer Text */
        .input-group { display: flex; align-items: center; justify-content: center; }
        input[type="text"] { background: none; border: none; color: white; font-size: clamp(60px, 8vw, 110px); font-weight: 900; width: 1.5ch; text-align: center; outline: none; transition: 0.3s; }
        .colon { font-size: 40px; font-weight: 900; color: #222; margin-bottom: 10px; }
        .active .colon { color: var(--red); text-shadow: 0 0 20px var(--red); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Buttons Styling */
        .btn-box { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
        button.main-action { 
            padding: 20px; 
            border-radius: 18px; 
            border: 1px solid #333; 
            background: #000; 
            color: #fff; 
            font-weight: 800; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .start-btn { border-color: var(--green) !important; color: var(--green) !important; box-shadow: 0 0 0 rgba(46, 204, 113, 0); }
        .active .start-btn { border-color: var(--red) !important; color: var(--red) !important; box-shadow: 0 0 20px rgba(255, 62, 62, 0.2); }
        
        .nav-btn { background: #0a0a0a; border: 1px solid #222; color: #666; padding: 15px; border-radius: 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover { color: white; border-color: #444; }

        /* Responsive Fixes */
        @media (max-width: 900px) {
            .app-container { flex-direction: column; height: 100vh; width: 100%; border-radius: 0; border: none; }
            .video-wrapper { flex: none; height: auto; padding: 10px; }
            .timer-card { flex: 1; border-left: none; border-top: 1px solid var(--border); padding: 20px; justify-content: center; }
            .set-widget { margin-bottom: 20px; }
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: var(--red); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px); }
        #overlay h1 { font-size: 80px; margin: 0; letter-spacing: 10px; }
    </style>
</head>
<body>

    <div class="app-container" id="main-ui">
        <div class="video-wrapper">
            <div class="video-container">
                <div id="player"></div>
            </div>
        </div>

        <div class="timer-card">
            <div class="set-widget">
                <span class="set-label">Sets</span>
                <button class="set-btn" onclick="updateSet(-1)">−</button>
                <span id="setCount" class="set-count">0</span>
                <button class="set-btn" onclick="updateSet(1)">+</button>
            </div>

            <div class="input-group">
                <input type="text" id="m" value="02" maxlength="2">
                <span class="colon">:</span>
                <input type="text" id="s" value="00" maxlength="2">
            </div>
            
            <div class="btn-box">
                <button class="main-action start-btn" id="mainBtn" onclick="toggleTimer()">Start Rest</button>
                <button class="nav-btn" onclick="resetTimer()">Reset Timer</button>
                <button class="nav-btn" style="margin-top:20px;" onclick="shuffleVideo()">Next Video</button>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAlert()"><h1>DONE</h1><p>TAP TO RETURN</p></div>

    <script>
        let timer, running = false, secondsLeft = 120, sets = 0;
        let player;
        const playlistIDs = ['UUiYcA0gJzg855iSKMrX3oHg', 'UU7_YxT-KID8kRbqZo7MyscQ'];

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            const randomPlaylist = playlistIDs[Math.floor(Math.random() * playlistIDs.length)];
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { 'listType': 'playlist', 'list': randomPlaylist, 'autoplay': 1, 'index': Math.floor(Math.random() * 50), 'modestbranding': 1 },
                events: { 'onReady': (e) => e.target.setShuffle(true), 'onError': onPlayerError }
            });
        }

        function shuffleVideo() {
            if (player) {
                player.loadPlaylist({
                    list: playlistIDs[Math.floor(Math.random() * playlistIDs.length)],
                    listType: 'playlist', index: Math.floor(Math.random() * 50)
                });
                player.setShuffle(true);
            }
        }

        function onPlayerError() { shuffleVideo(); }
        function updateSet(val) { sets = Math.max(0, sets + val); document.getElementById('setCount').textContent = sets; }

        function toggleTimer() {
            if (running) {
                clearInterval(timer); running = false;
                document.getElementById('mainBtn').textContent = "Resume Rest";
                document.getElementById('main-ui').classList.remove('active');
            } else {
                let m = parseInt(document.getElementById('m').value) || 0;
                let s = parseInt(document.getElementById('s').value) || 0;
                secondsLeft = (m * 60) + s; running = true;
                document.getElementById('mainBtn').textContent = "Pause Rest";
                document.getElementById('main-ui').classList.add('active');
                timer = setInterval(tick, 1000);
            }
        }

        function tick() {
            if (secondsLeft <= 0) {
                clearInterval(timer); running = false;
                document.getElementById('overlay').style.display = 'flex';
                return;
            }
            secondsLeft--;
            document.getElementById('m').value = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
            document.getElementById('s').value = (secondsLeft % 60).toString().padStart(2, '0');
        }

        function closeAlert() { document.getElementById('overlay').style.display = 'none'; resetTimer(); }
        function resetTimer() {
            clearInterval(timer); running = false;
            document.getElementById('main-ui').classList.remove('active');
            document.getElementById('mainBtn').textContent = "Start Rest";
            document.getElementById('m').value = "02"; document.getElementById('s').value = "00";
            secondsLeft = 120;
        }
    </script>
</body>
</html>
