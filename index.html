<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eclipse Rest Station</title>
    <style>
        :root { 
            --red: #ff3e3e; 
            --bg: #050505; 
            --card-bg: #111111;
            --green: #2ecc71; 
            --border: #222;
        }
        
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            height: 100vh; 
            overflow: hidden;
        }

        .app-container { 
            display: flex; 
            width: 100%; 
            height: 100vh; 
            background: var(--bg);
        }

        /* Video Section */
        .video-wrapper { 
            flex: 3; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .video-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }
        #player { width: 100%; height: 100%; border: none; }

        /* Controls Section */
        .timer-card { 
            flex: 1.5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            border-left: 1px solid var(--border);
        }

        /* Sets Widget */
        .set-widget {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #111;
            padding: 12px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .set-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #555; font-weight: 800; }
        .set-count { font-size: 28px; font-weight: 900; min-width: 35px; text-align: center; color: var(--green); }
        .set-btn { background: #222; border: 1px solid #444; color: white; border-radius: 10px; width: 40px; height: 40px; cursor: pointer; font-weight: bold; }

        /* Timer - The Fix is Here */
        .input-group { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        input[type="text"] { 
            background: none; 
            border: none; 
            color: white; 
            font-size: 100px; /* Reduced for better fit */
            font-weight: 900; 
            width: 140px; 
            text-align: center; 
            outline: none; 
        }
        .colon { 
            font-size: 60px; 
            font-weight: 900; 
            color: #222; 
            padding-bottom: 10px;
        }
        .active .colon { color: var(--red); text-shadow: 0 0 20px var(--red); }

        /* Buttons */
        .btn-box { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
        button.main-action { 
            padding: 18px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            background: #0a0a0a; 
            color: #fff; 
            font-weight: 800; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
        }
        .start-btn { border-color: var(--green) !important; color: var(--green) !important; }
        .active .start-btn { border-color: var(--red) !important; color: var(--red) !important; }
        
        .nav-btn { background: #111; border: 1px solid #222; color: #666; padding: 15px; border-radius: 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        /* Mobile Fix for Cropping */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .video-wrapper { height: auto; padding: 10px; }
            .timer-card { border-left: none; padding: 10px; justify-content: flex-start; }
            
            /* Responsive Font sizing to prevent distortion */
            input[type="text"] { font-size: 22vw !important; width: 35vw !important; }
            .colon { font-size: 15vw !important; }
            
            .btn-box { width: 90%; }
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div class="app-container" id="main-ui">
        <div class="video-wrapper">
            <div class="video-container">
                <div id="player"></div>
            </div>
        </div>

        <div class="timer-card">
            <div class="set-widget">
                <span class="set-label">Sets</span>
                <button class="set-btn" onclick="updateSet(-1)">−</button>
                <span id="setCount" class="set-count">0</span>
                <button class="set-btn" onclick="updateSet(1)">+</button>
            </div>

            <div class="input-group">
                <input type="text" id="m" value="02" maxlength="2">
                <span class="colon">:</span>
                <input type="text" id="s" value="00" maxlength="2">
            </div>
            
            <div class="btn-box">
                <button class="main-action start-btn" id="mainBtn" onclick="toggleTimer()">Start Rest</button>
                <button class="nav-btn" onclick="resetTimer()">Reset Timer</button>
                <button class="nav-btn" onclick="shuffleVideo()">Next Video</button>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAlert()"><h1>DONE</h1><p>TAP TO RETURN</p></div>

    <script>
        let timer, running = false, secondsLeft = 120, sets = 0;
        let player;
        const playlistIDs = ['UUiYcA0gJzg855iSKMrX3oHg', 'UU7_YxT-KID8kRbqZo7MyscQ'];

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            const randomPlaylist = playlistIDs[Math.floor(Math.random() * playlistIDs.length)];
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { 'listType': 'playlist', 'list': randomPlaylist, 'autoplay': 1, 'index': Math.floor(Math.random() * 50), 'modestbranding': 1 },
                events: { 'onReady': (e) => e.target.setShuffle(true), 'onError': onPlayerError }
            });
        }

        function shuffleVideo() {
            if (player) {
                player.loadPlaylist({
                    list: playlistIDs[Math.floor(Math.random() * playlistIDs.length)],
                    listType: 'playlist', index: Math.floor(Math.random() * 50)
                });
                player.setShuffle(true);
            }
        }

        function onPlayerError() { shuffleVideo(); }
        function updateSet(val) { sets = Math.max(0, sets + val); document.getElementById('setCount').textContent = sets; }

        function toggleTimer() {
            if (running) {
                clearInterval(timer); running = false;
                document.getElementById('mainBtn').textContent = "Resume Rest";
                document.getElementById('main-ui').classList.remove('active');
            } else {
                let m = parseInt(document.getElementById('m').value) || 0;
                let s = parseInt(document.getElementById('s').value) || 0;
                secondsLeft = (m * 60) + s; running = true;
                document.getElementById('mainBtn').textContent = "Pause Rest";
                document.getElementById('main-ui').classList.add('active');
                timer = setInterval(tick, 1000);
            }
        }

        function tick() {
            if (secondsLeft <= 0) {
                clearInterval(timer); running = false;
                document.getElementById('overlay').style.display = 'flex';
                return;
            }
            secondsLeft--;
            document.getElementById('m').value = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
            document.getElementById('s').value = (secondsLeft % 60).toString().padStart(2, '0');
        }

        function closeAlert() { document.getElementById('overlay').style.display = 'none'; resetTimer(); }
        function resetTimer() {
            clearInterval(timer); running = false;
            document.getElementById('main-ui').classList.remove('active');
            document.getElementById('mainBtn').textContent = "Start Rest";
            document.getElementById('m').value = "02"; document.getElementById('s').value = "00";
            secondsLeft = 120;
        }
    </script>
</body>
</html>
